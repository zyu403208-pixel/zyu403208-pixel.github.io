<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<!-- TikTok Pixel -->
<script>
!function (w, d, t) {
w.TiktokAnalyticsObject=t;
var ttq=w[t]=w[t]||[];
ttq.methods=["page","track"];
ttq.setAndDefer=function(t,e){
t[e]=function(){
t.push([e].concat(Array.prototype.slice.call(arguments,0)))
}
};
for(var i=0;i<ttq.methods.length;i++){
ttq.setAndDefer(ttq,ttq.methods[i]);
}
ttq.load('你的PixelID');
ttq.page();
}(window, document, 'ttq');
</script>

<style>
body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:sans-serif;
margin-top:100px;
}
button{
padding:15px 30px;
font-size:20px;
background:#00ff99;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>🎮 Preparing Your Bonus...</h2>
<button onclick="goOffer()">ENTER GAME</button>

<script>

// ⭐ 用户停留事件
setTimeout(function(){
ttq.track('ViewContent');
},1500);


// ============================
// ⭐ OFFER 管理区（只改这里）
// ============================

const OFFERS = {

"JP":"https://甲方A.com",
"BR":"https://甲方B.com",
"ID":"https://甲方C.com",

"default":"https://备用Offer.com"

};


// ============================
// ⭐ 自动识别国家
// ============================

async function getCountry(){

try{

let res = await fetch("https://ipapi.co/json/");
let data = await res.json();

return data.country;

}catch(e){

return "default";

}

}


// ============================
// ⭐ 点击后跳转
// ============================

async function goOffer(){

ttq.track('InitiateCheckout');

let country = await getCountry();

let url = OFFERS[country] || OFFERS["default"];

setTimeout(()=>{
window.location.href = url;
},300);

}

</script>

</body>
</html>
