<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Floating Text</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* 🌈 动态背景 */
body{
background:linear-gradient(160deg,#ff758c,#ff7eb3,#667eea);
background-size:300% 300%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* 中央提示 */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:28px;
text-align:center;
pointer-events:none;
}

/* ⭐ 满屏文字 */
.word{
position:absolute;
white-space:nowrap;
font-weight:bold;
pointer-events:none;
opacity:.9;

animation:move linear infinite;
}

/* 随机移动 */
@keyframes move{
0%{transform:translate(0,0);}
25%{transform:translate(80px,-120px);}
50%{transform:translate(-60px,-240px);}
75%{transform:translate(100px,-360px);}
100%{transform:translate(-40px,-500px);}
}

/* ❤️ 爱心 */
.heart{
position:absolute;
font-size:28px;
pointer-events:none;
animation:heartFloat 1.5s forwards;
}

@keyframes heartFloat{
0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
100%{opacity:0;transform:translate(-50%,-200%) scale(2);}
}

</style>
</head>

<body>

<div class="center">
✨ 点击屏幕 ❤️ ✨
</div>

<script>

/* ===== 文案池 ===== */
const tips=[
'好运来了','今天必幸运','奇迹发生中',
'幸福正在靠近','梦想成真','好运暴涨',
'你被幸运选中','惊喜马上出现',
'保持开心','机会来了','改变正在发生',
'下一秒不同','幸运加载中','别错过今天'
];

const colors=[
'#ffffff','#FFD700','#FFB6C1','#7FFFD4','#FFFACD'
];

/* ⭐ 创建满屏文字 */
function createWord(){

let w=document.createElement("div");
w.className="word";

w.innerText=tips[Math.floor(Math.random()*tips.length)];

w.style.color=colors[Math.floor(Math.random()*colors.length)];

w.style.fontSize=(16+Math.random()*24)+"px";

/* 随机屏幕位置 */
w.style.left=Math.random()*window.innerWidth+"px";
w.style.top=Math.random()*window.innerHeight+"px";

/* 随机速度 */
w.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(w);

/* 自动清理避免卡顿 */
setTimeout(()=>w.remove(),12000);
}

/* 🔥 关键：持续填满屏幕 */
setInterval(()=>{
for(let i=0;i<12;i++){
createWord();
}
},250);


/* ❤️ 点击爱心 */
function heart(x,y){
let h=document.createElement("div");
h.className="heart";
h.innerText="❤️";
h.style.left=x+"px";
h.style.top=y+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1500);
}

document.addEventListener("click",e=>{
heart(e.clientX,e.clientY);
});

document.addEventListener("touchstart",e=>{
let t=e.touches[0];
heart(t.clientX,t.clientY);
});

</script>

</body>
</html>
