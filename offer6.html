<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<title>Welcome</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* 🌈 动态渐变背景 */
body{
background:linear-gradient(160deg,#ff758c,#ff7eb3,#667eea);
background-size:300% 300%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* ⭐ 中央大卡片 */
.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:88%;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
text-align:center;
color:white;
box-shadow:0 15px 50px rgba(0,0,0,.3);

animation:breath 3s infinite;
}

@keyframes breath{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.04);}
100%{transform:translate(-50%,-50%) scale(1);}
}

h1{
font-size:30px;
margin-bottom:10px;
}

p{
font-size:18px;
opacity:.9;
}

/* 飘动文字 */
.tip{
position:absolute;
font-weight:bold;
pointer-events:none;
animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
0%{opacity:0;transform:translateY(40px);}
20%{opacity:1;}
100%{opacity:0;transform:translateY(-120px);}
}

</style>
</head>

<body>

<div class="card">
<h1>✨ 欢迎来到今天 ✨</h1>
<p>愿好运与惊喜一直陪伴你 ❤️</p>
</div>

<script>

const tips=[
'保持微笑 😊',
'今天会很顺利',
'好运正在靠近',
'别忘了喝水',
'愿你被温柔对待',
'梦想正在实现',
'一切都会更好',
'开心最重要'
];

const colors=[
'#ffffff','#FFD700','#FFB6C1','#7FFFD4','#FFFACD'
];

function createTip(){

let tip=document.createElement("div");
tip.className="tip";

tip.innerText=tips[Math.floor(Math.random()*tips.length)];

tip.style.color=colors[Math.floor(Math.random()*colors.length)];

tip.style.fontSize=(24+Math.random()*18)+"px";

tip.style.left=Math.random()*window.innerWidth+"px";
tip.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(tip);

setTimeout(()=>{
tip.remove();
},4000);
}

setInterval(createTip,900);

</script>

</body>
</html>
