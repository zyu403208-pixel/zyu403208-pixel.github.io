<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Emotion Page</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* 🌈 动态背景 */
body{
background:linear-gradient(160deg,#ff758c,#ff7eb3,#667eea);
background-size:300% 300%;
animation:bgMove 15s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* ⭐ 背景定制文案（重点） */
.bg-text{
position:absolute;
width:200%;
height:200%;
color:rgba(255,255,255,0.08);
font-size:70px;
font-weight:bold;
line-height:120px;
white-space:pre;
transform:rotate(-20deg);
animation:bgScroll 40s linear infinite;
pointer-events:none;
}

@keyframes bgScroll{
0%{transform:translate(-20%,-20%) rotate(-20deg);}
100%{transform:translate(0%,0%) rotate(-20deg);}
}

/* 前景漂浮文字 */
.word{
position:absolute;
white-space:nowrap;
font-weight:bold;
pointer-events:none;
animation:move linear infinite;
}

@keyframes move{
0%{transform:translate(0,0);}
50%{transform:translate(60px,-250px);}
100%{transform:translate(-60px,-500px);}
}

/* ❤️ 爱心 */
.heart{
position:absolute;
font-size:30px;
pointer-events:none;
animation:heartFloat 1.6s forwards;
}

@keyframes heartFloat{
0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
100%{opacity:0;transform:translate(-50%,-200%) scale(2);}
}

/* 中央提示 */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:26px;
text-align:center;
pointer-events:none;
}

</style>
</head>

<body>

<!-- ⭐ 背景定制文案 -->
<div class="bg-text">
·素素专用·素素专用·素素专用·素素专用·素素专用·
·素素专用·素素专用·素素专用·素素专用·素素专用·
</div>

<div class="center">
✨ 点击屏幕 ❤️ ✨
</div>

<script>

/* ===== 可自己修改的文案 ===== */
const tips=[
'好运来了','今天必幸运','奇迹发生中',
'幸福正在靠近','梦想成真','好运暴涨',
'机会就在眼前','你被幸运选中',
'惊喜马上出现','保持开心','改变正在发生'
];

const colors=[
'#ffffff','#FFD700','#FFB6C1','#7FFFD4','#FFFACD'
];

/* ⭐ 满屏漂浮文字 */
function createWord(){

let w=document.createElement("div");
w.className="word";

w.innerText=tips[Math.floor(Math.random()*tips.length)];

w.style.color=colors[Math.floor(Math.random()*colors.length)];

w.style.fontSize=(16+Math.random()*26)+"px";

w.style.left=Math.random()*window.innerWidth+"px";
w.style.top=Math.random()*window.innerHeight+"px";

w.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(w);

setTimeout(()=>w.remove(),12000);
}

/* 持续填满屏幕 */
setInterval(()=>{
for(let i=0;i<12;i++){
createWord();
}
},250);


/* ❤️ 点击爱心 */
function heart(x,y){
let h=document.createElement("div");
h.className="heart";
h.innerText="❤️";
h.style.left=x+"px";
h.style.top=y+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1600);
}

document.addEventListener("click",e=>{
heart(e.clientX,e.clientY);
});

document.addEventListener("touchstart",e=>{
let t=e.touches[0];
heart(t.clientX,t.clientY);
});

</script>

</body>
</html>
