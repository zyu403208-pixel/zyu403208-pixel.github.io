<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>Warm Tips Mobile</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* 📱 手机渐变背景 */
body{
background:linear-gradient(160deg,#ff758c,#ff7eb3,#667eea);
background-size:300% 300%;
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* 📱 手机中央卡片 */
.card{
position:absolute;
bottom:8%;
left:50%;
transform:translateX(-50%);
width:88%;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:25px;
padding:28px;
text-align:center;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.3);

animation:cardBreath 3s infinite;
}

@keyframes cardBreath{
0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.03);}
100%{transform:translateX(-50%) scale(1);}
}

h1{
font-size:28px;
margin:10px 0;
}

p{
font-size:18px;
opacity:.9;
}

/* ⭐ 手机大按钮 */
.btn{
margin-top:20px;
width:100%;
padding:18px;
font-size:22px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#FFD700,#FFA500);
color:#c62828;
font-weight:bold;
animation:btnPulse 1.5s infinite;
}

@keyframes btnPulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* 飘字 */
.tip{
position:absolute;
pointer-events:none;
font-weight:bold;
animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
0%{opacity:0;transform:translateY(30px);}
20%{opacity:1;}
100%{opacity:0;transform:translateY(-100px);}
}

</style>
</head>

<body>

<div class="card">
<h1>✨ 今日幸运提示 ✨</h1>
<p>点击继续，看看今天的惊喜 ❤️</p>
<button class="btn" onclick="go()">CONTINUE</button>
</div>

<script>

const tips=[
'好运正在靠近','今天会很顺利','保持好心情',
'惊喜马上出现','机会来了','你值得拥有',
'好运加载中...','别错过今天'
];

const colors=[
'#ffffff','#FFD700','#FFB6C1','#7FFFD4','#FFF'
];

function createTip(){

let tip=document.createElement("div");
tip.className="tip";

tip.innerText=tips[Math.floor(Math.random()*tips.length)];

tip.style.color=colors[Math.floor(Math.random()*colors.length)];

tip.style.fontSize=(22+Math.random()*18)+"px";

tip.style.left=Math.random()*window.innerWidth+"px";
tip.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(tip);

setTimeout(()=>{tip.remove();},4000);
}

setInterval(createTip,900);

/* 点击跳转 */
function go(){
window.location.href="https://你的甲方链接.com";
}

</script>

</body>
</html>
