<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Warm Tips</title>

<style>

body{
margin:0;
overflow:hidden;
background:white;
font-family:"Microsoft YaHei", Arial;
}

/* 飘出的文字样式 */
.tip{
position:absolute;
pointer-events:none;
animation:floatUp 3s linear forwards;
}

/* 漂浮动画 */
@keyframes floatUp{
0%{
opacity:0;
transform:translateY(30px);
}
30%{
opacity:1;
}
100%{
opacity:0;
transform:translateY(-60px);
}
}

</style>
</head>

<body>

<script>

const tips=[
'多喝水哦~','保持微笑呀','每天都要元气满满',
'记得吃水果','保持好心情','好好爱自己','我想你了',
'梦想成真','期待下一次见面','金榜题名',
'顺顺利利','早点休息','愿所有烦恼都消失',
'别熬夜','今天过得开心嘛','天冷了，多穿衣服'
];

const colors=[
'#FFB6C1','#FF69B4','#DA70D6','#EE82EE','#9370DB',
'#7B68EE','#6495ED','#48D1CC','#00FFFF','#7FFFAA',
'#98FB98','#ADFF2F','#FFFF00','#FFD700','#FFA500',
'#FF8C00','#FF4500','#A52A2A','#8B4513'
];

function createTip(){

for(let i=0;i<5;i++){

let tip=document.createElement("div");
tip.className="tip";

tip.innerText=tips[Math.floor(Math.random()*tips.length)];

tip.style.color=colors[Math.floor(Math.random()*colors.length)];

tip.style.fontSize=(12+Math.random()*20)+"px";

tip.style.left=Math.random()*window.innerWidth+"px";
tip.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(tip);

setTimeout(()=>{
tip.remove();
},3000);

}
}

// 每0.8秒生成一次
setInterval(createTip,800);

</script>

</body>
</html>
