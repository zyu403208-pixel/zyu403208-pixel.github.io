<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f2f2f2;
font-family:Arial;
}

/* 卡片呼吸效果 */
.card{
background:#4a4a4a;
color:white;
padding:35px;
border-radius:20px;
max-width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.25);

animation:cardBreath 3s infinite ease-in-out;
}

@keyframes cardBreath{
0%{transform:scale(1);}
50%{transform:scale(1.02);}
100%{transform:scale(1);}
}

/* 18+ 圆形 */
.badge{
width:80px;
height:80px;
margin:auto;
border-radius:50%;
background:linear-gradient(45deg,#ffb300,#ff6f00);
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
color:#c62828;
margin-bottom:15px;

animation:pulseGlow 2s infinite;
}

/* 发光呼吸 */
@keyframes pulseGlow{
0%{box-shadow:0 0 10px rgba(255,180,0,0.5);}
50%{box-shadow:0 0 25px rgba(255,180,0,1);}
100%{box-shadow:0 0 10px rgba(255,180,0,0.5);}
}

/* 按钮呼吸核心 */
button{
margin-top:30px;
background:linear-gradient(45deg,#ffd54f,#ffb300);
border:none;
padding:18px 45px;
font-size:22px;
font-weight:bold;
border-radius:40px;
cursor:pointer;
color:#c62828;

animation:buttonBreath 1.5s infinite;
}

/* 真正提高点击率的动画 */
@keyframes buttonBreath{
0%{
transform:scale(1);
box-shadow:0 0 0 rgba(255,179,0,0.6);
}
50%{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,179,0,1);
}
100%{
transform:scale(1);
box-shadow:0 0 0 rgba(255,179,0,0.6);
}
}

/* Hover 再增强 */
button:hover{
transform:scale(1.15);
}
