<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Emotion Page</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* 🌈 动态背景 */
body{
background:linear-gradient(160deg,#ff758c,#ff7eb3,#667eea);
background-size:300% 300%;
animation:bgMove 15s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* ⭐⭐⭐ 立体背景文字 */
.bg-text{
position:absolute;
width:220%;
height:220%;

font-size:90px;
font-weight:900;
letter-spacing:6px;
line-height:140px;
white-space:pre;

color:rgba(255,255,255,0.15);

text-shadow:
0 2px 4px rgba(0,0,0,0.2),
0 6px 12px rgba(0,0,0,0.25),
0 12px 30px rgba(0,0,0,0.35),
0 0 20px rgba(255,255,255,0.25);

transform:
perspective(800px)
rotateX(20deg)
rotateZ(-18deg);

animation:bgScroll 35s linear infinite;

pointer-events:none;
}

@keyframes bgScroll{
0%{
transform:
perspective(800px)
rotateX(20deg)
rotateZ(-18deg)
translate(-30%,-30%);
}

100%{
transform:
perspective(800px)
rotateX(20deg)
rotateZ(-18deg)
translate(0%,0%);
}
}

/* ⭐ 满屏漂浮文字 */
.word{
position:absolute;
white-space:nowrap;
font-weight:bold;
pointer-events:none;
animation:move linear infinite;
}

@keyframes move{
0%{transform:translate(0,0);}
50%{transform:translate(60px,-250px);}
100%{transform:translate(-60px,-500px);}
}

/* ❤️ 爱心 */
.heart{
position:absolute;
font-size:32px;
pointer-events:none;
animation:heartFloat 1.6s forwards;
}

@keyframes heartFloat{
0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
100%{opacity:0;transform:translate(-50%,-200%) scale(2);}
}

/* 中央提示 */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:26px;
text-align:center;
pointer-events:none;
font-weight:bold;
}

</style>
</head>

<body>

<!-- ⭐⭐⭐ 背景定制文案（自己改这里） -->
<div class="bg-text">
LUCKY • WIN • SUCCESS • JACKPOT • MONEY • DREAM •
LUCKY • WIN • SUCCESS • JACKPOT • MONEY • DREAM •
LUCKY • WIN • SUCCESS • JACKPOT • MONEY • DREAM •
</div>

<div class="center">
✨ 点击屏幕 ❤️ ✨
</div>

<script>

/* ===== 前景漂浮文案 ===== */
const tips=[
'好运来了','今天必幸运','奇迹发生中',
'机会就在眼前','梦想正在实现',
'幸运加载中','改变正在发生',
'下一秒不同','好运暴涨中'
];

const colors=[
'#ffffff','#FFD700','#FFB6C1','#7FFFD4','#FFFACD'
];

/* 创建漂浮文字 */
function createWord(){

let w=document.createElement("div");
w.className="word";

w.innerText=tips[Math.floor(Math.random()*tips.length)];

w.style.color=colors[Math.floor(Math.random()*colors.length)];
w.style.fontSize=(16+Math.random()*26)+"px";

w.style.left=Math.random()*window.innerWidth+"px";
w.style.top=Math.random()*window.innerHeight+"px";

w.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(w);

setTimeout(()=>w.remove(),12000);
}

/* 持续填满屏幕 */
setInterval(()=>{
for(let i=0;i<12;i++){
createWord();
}
},250);


/* ❤️ 点击出现爱心 */
function heart(x,y){
let h=document.createElement("div");
h.className="heart";
h.innerText="❤️";
h.style.left=x+"px";
h.style.top=y+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1600);
}

document.addEventListener("click",e=>{
heart(e.clientX,e.clientY);
});

document.addEventListener("touchstart",e=>{
let t=e.touches[0];
heart(t.clientX,t.clientY);
});

</script>

</body>
</html>
